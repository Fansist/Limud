# Wrangler configuration for Limud EdTech Platform
# Deployed via @cloudflare/next-on-pages

name = "limud"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

# Environment variables (set via wrangler secret or Cloudflare dashboard)
# Required secrets (set with: npx wrangler pages secret put SECRET_NAME --project-name limud):
# - DATABASE_URL: PostgreSQL connection string (e.g., Neon, Supabase, or PlanetScale)
# - NEXTAUTH_SECRET: Secret for NextAuth.js JWT signing
# - NEXTAUTH_URL: The production deployment URL
# - OPENAI_API_KEY: OpenAI API key for AI features (or "demo-mode" for demo)

[vars]
NEXT_PUBLIC_APP_NAME = "Limud"

# Note: For production, use a hosted PostgreSQL provider:
# - Neon (neon.tech) - Serverless PostgreSQL, free tier available
# - Supabase (supabase.com) - PostgreSQL + extras, free tier
# - PlanetScale (planetscale.com) - MySQL-compatible, free tier
# Set the DATABASE_URL secret to your provider's connection string
